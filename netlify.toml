# Netlify Configuration for OpenToolsKit

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"

# Host and legacy redirects. Do not use a SPA catch-all for a static export; missing pages should 404.
[[redirects]]
  from = "https://opentoolskit.com/*"
  to = "https://www.opentoolskit.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://opentoolskit.com/*"
  to = "https://www.opentoolskit.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.opentoolskit.com/*"
  to = "https://www.opentoolskit.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  force = false

[[redirects]]
  from = "/support"
  to = "/en/contact/"
  status = 301

[[redirects]]
  from = "/source"
  to = "/en/contact/"
  status = 301

[[redirects]]
  from = "/pdf-tools"
  to = "/en/tools/"
  status = 301

[[redirects]]
  from = "/tools"
  to = "/en/tools/"
  status = 301

[[redirects]]
  from = "/tools/*"
  to = "/en/tools/:splat"
  status = 301

[[redirects]]
  from = "/workflow"
  to = "/en/workflow/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/en/about/"
  status = 301

[[redirects]]
  from = "/faq"
  to = "/en/faq/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/en/privacy/"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/en/terms/"
  status = 301

[[redirects]]
  from = "/editorial"
  to = "/en/editorial/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/en/contact/"
  status = 301

[[redirects]]
  from = "/merge-pdf"
  to = "/en/tools/merge-pdf/"
  status = 301

[[redirects]]
  from = "/split-pdf"
  to = "/en/tools/split-pdf/"
