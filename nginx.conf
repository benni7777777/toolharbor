server {
    listen 80;
    server_name opentoolskit.com;
    return 301 https://www.opentoolskit.com$request_uri;
}

server {
    listen 80;
    server_name www.opentoolskit.com _;

    root /website/opentoolskit;
    index index.html;

    # ==========================================
    # Gzip Compression Settings
    # ==========================================
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm;

    # ==========================================
    # MIME Type Configuration
    # ==========================================
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
        application/javascript mjs;
    }

    # ==========================================
    # Security Headers (server level)
    # ==========================================
    # NOTE: Any location block using add_header will override ALL of these.
    # Every location block must re-include via: include /etc/nginx/security-headers.conf;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # ==========================================
    # Caching Strategy
    # ==========================================

    # Static Assets (Images, Fonts, etc.) - Long Term Cache
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/security-headers.conf;
        access_log off;
    }

    # JS, CSS, MJS Files - Long Term Cache
    location ~* \.(js|css|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/security-headers.conf;
        access_log off;
    }

    # Next.js Build Assets (_next/static)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/security-headers.conf;
        access_log off;
    }

    # Runtime workers - must revalidate on deploy
    location ^~ /workers/ {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    # PyMuPDF WASM assets - must revalidate on deploy
    location ^~ /pymupdf-wasm/ {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    # Locale-prefixed asset fallback: /en/workers/* → /workers/*
    location ~* ^/[A-Za-z-]+/(workers|pymupdf-wasm)/(.+)$ {
        rewrite ^/[A-Za-z-]+/(workers|pymupdf-wasm)/(.+)$ /$1/$2 break;
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    # ==========================================
    # LibreOffice WASM Files
    # ==========================================
    location ^~ /libreoffice-wasm/ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        types {
            application/wasm wasm;
            application/javascript js;
            application/octet-stream data;
        }
        include /etc/nginx/security-headers.conf;
    }

    # 404 Page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ==========================================
    # Core Routing Logic
    # ==========================================
    location = / {
        return 302 /en/;
    }

    location = /ads.txt {
        default_type text/plain;
        try_files /ads.txt =404;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    location ~ ^/(support|source)/?$ {
        return 301 /en/contact/;
    }

    location = /pdf-tools {
        return 301 /en/tools/;
    }

    location = /tools {
        return 301 /en/tools/;
    }

    location ~ ^/tools/(.+)$ {
        return 301 /en/tools/$1;
    }

    location ~ ^/(workflow|about|faq|privacy|terms|editorial|contact)/?$ {
        return 301 /en/$1/;
    }

    location ~ ^/(merge-pdf|split-pdf|compress-pdf|jpg-to-pdf|pdf-to-jpg|sign-pdf|encrypt-pdf)/?$ {
        return 301 /en/tools/$1/;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        include /etc/nginx/security-headers.conf;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}
